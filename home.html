<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Infinite Developer</title>

<link rel="icon" href="favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#05060a;
  --card:#0b0f1a;
  --neon:#00f7ff;
  --neon2:#7a5cff;
  --text:#e6f1ff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron', sans-serif;
}

body{
  background: radial-gradient(circle at top, #0b1020, var(--bg));
  color:var(--text);
  overflow-x:hidden;
}


.nav{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:999;
}

.nav button{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(0,247,255,0.3);
  color:white;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.nav button:hover{
  transform:scale(1.1);
  box-shadow:0 0 15px var(--neon);
}

  
.page{
  display:none;
  min-height:100vh;
  padding:120px 20px 60px;
}

.page.active{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}


.logo{
  width:260px;
  animation:floatIn 2s ease forwards;
  opacity:0;
  transform:translateY(50px);
  filter:drop-shadow(0 0 25px var(--neon));
}

@keyframes floatIn{
  to{opacity:1; transform:translateY(0);}
}

.subtitle{
  margin-top:20px;
  font-size:18px;
  text-align:center;
  max-width:700px;
  color:#b9dfff;
  min-height:40px;
}

.buttons{
  margin-top:40px;
  display:flex;
  gap:15px;
}

.bigbtn{
  padding:15px 18px;
  border:1px solid var(--neon);
  background:rgba(0,247,255,0.05);
  color:white;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.bigbtn:hover{
  transform:scale(1.15);
  box-shadow:0 0 20px var(--neon2);
}


form{
  width:100%;
  max-width:600px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

input, textarea{
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(0,247,255,0.3);
  background:#0a0f1c;
  color:white;
}

textarea{min-height:120px;}

.submit{
  background:var(--neon);
  border:none;
  padding:12px;
  cursor:pointer;
  font-weight:bold;
  border-radius:10px;
}

.card{
  width:90%;
  max-width:500px;
  background:var(--card);
  border-radius:15px;
  overflow:hidden;
  border:1px solid rgba(0,247,255,0.2);
  transition:0.3s;
  text-decoration:none;
  color:white;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px var(--neon);
}

.card img{width:100%;}
.card div{padding:15px;}


.track{
  display:flex;
  flex-direction:column;
  gap:10px;
  width:300px;
}

.track input{
  padding:12px;
  border-radius:10px;
}

.track button{
  padding:12px;
  border:none;
  background:var(--neon);
  border-radius:10px;
  cursor:pointer;
}


@media (max-width:768px){

  .nav{
    flex-direction:column;
    top:10px;
  }

  .buttons{
    flex-direction:column;
  }

  .page.active{
    justify-content:flex-start;
    padding-top:140px;
  }

  .logo{
    width:180px;
  }
}
</style>
</head>

<body>


<div class="nav">
  <button onclick="go('home')">Home</button>
  <button onclick="go('order')">Order</button>
  <button onclick="go('projects')">Projects</button>
  <button onclick="go('track')">Track</button>
</div>

<div id="home" class="page active">

  <img src="tds.jpg" class="logo">

  <div class="subtitle" id="typing"></div>

  <div class="buttons">
    <button class="bigbtn" onclick="go('order')">Make Order</button>
    <button class="bigbtn" onclick="go('projects')">Projects</button>
    <button class="bigbtn" onclick="go('track')">Track Order</button>
  </div>

</div>

<div id="order" class="page">

  <h1>Make Order</h1>

  <form action="https://formsubmit.co/hugobatigne@gmail.com" method="POST">
    <input name="IFC username" placeholder="Do not include @" required>
    <input name="company" placeholder="Name of company / VA / VO / other" required>
    <input name="type" placeholder="Website, Crew Center, Discord bot..." required>
    <textarea name="description" placeholder="Describe your project in detail" required></textarea>

    <button class="submit" type="submit">Send</button>
  </form>

</div>


<div id="projects" class="page">

  <h1>Projects</h1>

  <a class="card" href="#">
    <img src="project1.jpg">
    <div>
      <h2>Project One</h2>
      <p>Futuristic system built for IFC-related workflows.</p>
    </div>
  </a>

</div>


<div id="track" class="page">

  <h1>Track Order</h1>

  <div class="track">
    <input id="pass" type="password" placeholder="Enter password">
    <button onclick="track()">Access</button>
    <p id="msg"></p>
  </div>

</div>

<script>


function go(id){

  document.querySelectorAll('.page').forEach(p=>{
    p.classList.remove('active');
  });

  document.getElementById(id).classList.add('active');

}



const text = "The Infinite Developer - Coding for your IFC-related company or VA.";
let i = 0;

function type(){
  if(i < text.length){
    document.getElementById("typing").innerHTML += text[i];
    i++;
    setTimeout(type, 40);
  }
}

window.onload = type;



function track(){
  const val = document.getElementById("pass").value;
  const msg = document.getElementById("msg");

  if(val.trim()){
    msg.innerText = "Access granted - redirect system ready (next step)";
    msg.style.color = "#00f7ff";
  } else {
    msg.innerText = "Invalid password";
    msg.style.color = "red";
  }
}

</script>

</body>
</html>
